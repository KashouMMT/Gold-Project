lication that the user directly interacts with is through the web page? Implement it poorly and, to the user, the server-side becomes irrelevant! Today’s user expects a lot out of the web page: it has to load fast, expose the desired service, and be comfortable to view on all devices: from a desktop computers to tablets and mobile phones.\n\nIn this course, we will learn the basic tools that every web page coder needs to know. We will start from the ground up by learning how to implement modern web pages with HTML and CSS. We will then advance to learning how to code our pages such that its components rearrange and resize themselves automatically based on the size of the user’s screen. You’ll be able to code up a web page that will be just as useful on a mobile phone as on a desktop computer. No “pinch and zoom” required! Last but certainly not least, we will get a thorough introduction to the most ubiquitous, popular, and incredibly powerful language of the web: Javascript. Using Javascript, you will be able to build a fully functional web application that utilizes Ajax to expose server-side functionality and data to the end user.","id":"vhLVVTe9EeWnxw5wP_KHTw","slug":"html-css-javascript-for-web-developers","name":"HTML, CSS, and Javascript for Web Developers","startDate":1455563809932,"courseProgress":"37047050~vhLVVTe9EeWnxw5wP_KHTw","v2Details":{"plannedLaunchDate":"February 15, 2016","id":"vhLVVTe9EeWnxw5wP_KHTw","onDemandSessions":["6y3gWp9HEe2oKxLVL-6BEw","YNLmPGEdEei0LRIOovsdtA","jtUXNUbWEe-pMwr_10wFbw","n2d1O-RAEeyT7QqCRpM1Uw","43Tj3z4yEe-XqRLMhz9J4w","8S3H2hYxEeukqhIM-OXb5Q","-cKSbk4UEeeoYA4K1tdJXg","3GxNZpRGEe2pIQ442Sfx7w","fPi-vZxPEe6Eggr6EIigUw","39-bp_dJEe25zQq_oW9viQ","aSO_ZakQEeau2AoFCKXi2g","nbx4k-FJEe2PTBI773qrhQ","HMNVy5UmEeme4wo6I-rI1A","2AVJ7lwNEe-pPQ5LmDacDQ","3mR1vcBHEe2zRgo-DuY2eQ","HjAo9bs3EeuCOA4166pzfQ","oTd6mms8Eeyx1xLO3cGALw","TJEmCq4fEeik3Qqfk5J7qA","hAvDt35FEe2biBKatCPAOQ","PvgqelMkEemmlQrmdJbDmA","2PG96dE3EeuwrA43TqFbnw","jvUnVNUREea ers to tablets and mobile phones.\n\nThis course provides a comprehensive introduction to webpage styling and layout using CSS. It will discuss how one can select and target specific HTML elements, apply styles using CSS properties, and interact with the CSS box model. Additionally, the course teaches key CSS concepts, including selectors, specificity, inheritance, units of measurement, positioning, and floats. The course will also cover responsive design principles and how to use media queries to create websites that adapt to different screen sizes. Additionally, the course will introduce Bootstrap, a popular CSS framework, and demonstrates how to use its grid system to build responsive layouts efficiently. By the end of the course, learners have a solid foundation in CSS and be able to create visually appealing and responsive websites.","id":"PCagZyziEe-fXA7rs9T_Xw","slug":"introduction-to-css3-jhu","name":"Introduction to CSS3","startDate":1720553851266,"courseProgress":"37047050~PCagZyziEe-fXA7rs9T_Xw","v2Details":{"id":"PCagZyziEe-fXA7rs9T_Xw","onDemandSessions":["ztnY5FzUEe-pPQ5LmDacDQ","sAzEij4qEe-9aQ7RciQrRQ","g2B5zEIcEe-dvQr__nJeTw","3ZGgXT4yEe-XqRLMhz9J4w","3YVESz4yEe-XqRLMhz9J4w","3YSoCj4yEe-XqRLMhz9J4w","dvSJ8FKfEe-5jwr_0uSyEQ","iI0ejEbWEe-pMwr_10wFbw","3ZF5TD4yEe-XqRLMhz9J4w","3ZGgXj4yEe-XqRLMhz9J4w"]},"membershipIds":[],"memberships":[]},{"courseType":"v2.ondemand","description":"Do you realize that the only functionality of a web application that the user directly interacts with is through the web page? Implement it poorly and, to the user, the server-side becomes irrelevant! Today’s user expects a lot out of the web page: it has to load fast, expose the desired service, and be comfortable to view on all devices: from a desktop computers to tablets and mobile phones.\n\nThis course offers a step-by-step guide to building a fully functional and responsive website for a real client. Starting from understanding client requirements, the course shows all aspects of website development. It covers topics from lessons on coding a website header and navigation menu, crafting a responsive homepage and menu page using Bootstrap and CSS to resolving potential website resize issues for a seamless mobile experience. The course emphasizes hands-on learning, guiding learners in creating a restaurant website. Through building the restaurant website, learners will gain expertise in requirements gathering, website design and development, responsive web design, and ensuring a visually appealing and user-friendly website that works across all devices.","id":"ZR7oxCziEe-fXA7rs9T_Xw","slug":"coding-the-static-restaurant-site-jhu","name":"Coding the Static Restaurant Site","startDate":1720553867405,"courseProgress":"37047050~ZR7oxCziEe-fXA7rs9T_Xw","v2Details":{"id":"ZR7oxCziEe-fXA7rs9T_Xw","onDemandSessions":["J-VLbz4yEe-rdwr_1J6Ldw","J9uuez4yEe-rdwr_1J6Ldw","uZpyjD4qEe-9aQ7RciQrRQ","J91cLT4yEe-rdwr_1J6Ldw","J-SIHj4yEe-rdwr_1J6Ldw","8eRLFVzTEe-kchIg1UQgxw","J9v8nD4yEe-rdwr_1J6Ldw","030CzEIbEe-FeBL45rIhiw","hdy5TlKeEe-5jwr_0uSyEQ","o-UMCEbVEe-pMwr_10wFbw"]},"membershipIds":[],"memberships":[]},{"courseType":"v2.ondemand","description":"Do you realize that the only functionality of a web application that the user directly interacts with is through the web page? Implement it poorly and, to the user, the server-side becomes irrelevant! Today’s user expects a lot out of the web page: it has to load fast, expose the desired service, and be comfortable to view on all devices: from a desktop computers to tablets and mobile phones.\n\nThe course covers fundamental Javascript programming concepts, starting with variables, data types, operators, and control flow mechanisms. It will then teach learners about object-oriented programming in Javascript, object creation using literals and constructors, prototypes, and the intricacies of the 'this' keyword. After which, the course goes into the power of Javascript arrays, using namespaces and IIFEs to
